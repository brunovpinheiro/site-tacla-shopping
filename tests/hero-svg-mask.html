<!doctype html>
<html lang="pt-BR">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Hero</title>
		<style>
			* {
				margin: 0;
				padding: 0;
				box-sizing: border-box;
			}

			body {
				background: #001a40;
				font-family: sans-serif;
				cursor: none;
			}

			/* ── HERO ─────────────────────────────────────────── */
			.hero {
				position: relative;
				width: 100%;
				height: 100vh;
				background: #002256;
				overflow: hidden;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			/* SVG preenche toda a hero — camada fantasma */
			.star-ghost,
			.star-reveal {
				position: absolute;
				inset: 0;
				width: 100%;
				height: 100%;
				pointer-events: none;
			}

			.star-ghost svg,
			.star-reveal svg {
				width: 100%;
				height: 100%;
				/* preserva proporção do viewBox cobrindo o container */
				preserveaspectratio: xMidYMid slice;
			}

			.star-ghost svg path {
				stroke: rgba(128, 208, 214, 0);
				stroke-width: 1;
				fill: none;
			}

			/* Camada revelada — mascarada pelo glow */
			.star-reveal {
				-webkit-mask-image: radial-gradient(circle 200px at var(--mx, -999px) var(--my, -999px), black 0%, black 35%, transparent 100%);
				mask-image: radial-gradient(circle 200px at var(--mx, -999px) var(--my, -999px), black 0%, black 35%, transparent 100%);
			}

			.star-reveal svg path {
				stroke: #80d0d6;
				stroke-width: 1;
				fill: none;
				filter: drop-shadow(0 0 0px #80d0d6);
			}

			/* Div de luz */
			#glow {
				position: fixed;
				width: 700px;
				height: 700px;
				border-radius: 50%;
				pointer-events: none;
				transform: translate(-50%, -50%);
				background: radial-gradient(circle, rgba(128, 208, 214, 0.3) 0%, rgba(128, 208, 214, 0.08) 45%, transparent 70%);
				will-change: left, top;
				left: -999px;
				top: -999px;
				z-index: 2;
			}

			/* Conteúdo da hero */
			.hero-content {
				position: relative;
				z-index: 3;
				text-align: center;
				color: #fff;
			}

			.hero-content h1 {
				font-size: clamp(2rem, 6vw, 5rem);
				font-weight: 700;
				letter-spacing: -0.02em;
				color: #fff;
				text-shadow: 0 0 40px rgba(128, 208, 214, 0.3);
			}

			.hero-content p {
				margin-top: 1rem;
				font-size: clamp(1rem, 2vw, 1.25rem);
				color: rgba(128, 208, 214, 0.7);
				letter-spacing: 0.04em;
			}

			/* Cursor */
			#cursor {
				position: fixed;
				width: 0;
				height: 0;
				background: #80d0d6;
				border-radius: 50%;
				pointer-events: none;
				transform: translate(-50%, -50%);
				z-index: 10;
				box-shadow:
					0 0 10px #80d0d6,
					0 0 22px #80d0d650;
				left: -999px;
				top: -999px;
			}
		</style>
	</head>
	<body>
		<section class="hero">
			<!-- SVG fantasma (sutil, sempre visível) -->
			<div class="star-ghost">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2001 1039" preserveAspectRatio="xMidYMid slice">
					<g clip-path="url(#ghost-clip)">
						<path d="M1557.75 403.524c9.81-7.223 23.62-.244 23.62 11.881v856.065c0 12.39-10.05 22.43-22.44 22.44h-341.48c-12.39-.01-22.43-10.05-22.43-22.44v-212.69c.9-243.076 116.14-471.612 311.11-616.876h.14l.14-.098 51.34-38.283v.001ZM249.344 714.016h209.821c244.147 0 473.908 115.381 619.745 311.114v.14l.09.14 38.29 51.34c7.22 9.81.25 23.61-11.87 23.62H249.344c-12.392-.01-22.436-10.05-22.439-22.44V736.454l.008-.579c.304-11.933 9.919-21.547 21.852-21.852l.579-.007Zm193.408-968.111h341.474l.579.008c12.125.309 21.858 10.232 21.86 22.431v209.821c-.001 244.147-115.382 473.908-311.116 619.741h-.143l-.133.099-51.345 38.281c-9.808 7.225-23.611.254-23.615-11.868v-856.074c.002-12.199 9.735-22.122 21.86-22.431l.579-.008ZM896.405-60.686h856.065c12.39 0 22.43 10.045 22.44 22.438v341.475c-.01 12.392-10.05 22.437-22.44 22.438h-209.82c-244.15-.001-473.91-115.382-619.746-311.116v-.143l-.098-.133-38.283-51.345h.001c-7.224-9.809-.244-23.614 11.881-23.614Z" />
					</g>
					<defs>
						<clipPath id="ghost-clip"><path fill="#fff" d="M0 0h2001v1039H0z" /></clipPath>
					</defs>
				</svg>
			</div>

			<!-- SVG revelado pelo glow -->
			<div class="star-reveal" id="star-reveal">
				<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2001 1039" preserveAspectRatio="xMidYMid slice">
					<g clip-path="url(#reveal-clip)">
						<path d="M1557.75 403.524c9.81-7.223 23.62-.244 23.62 11.881v856.065c0 12.39-10.05 22.43-22.44 22.44h-341.48c-12.39-.01-22.43-10.05-22.43-22.44v-212.69c.9-243.076 116.14-471.612 311.11-616.876h.14l.14-.098 51.34-38.283v.001ZM249.344 714.016h209.821c244.147 0 473.908 115.381 619.745 311.114v.14l.09.14 38.29 51.34c7.22 9.81.25 23.61-11.87 23.62H249.344c-12.392-.01-22.436-10.05-22.439-22.44V736.454l.008-.579c.304-11.933 9.919-21.547 21.852-21.852l.579-.007Zm193.408-968.111h341.474l.579.008c12.125.309 21.858 10.232 21.86 22.431v209.821c-.001 244.147-115.382 473.908-311.116 619.741h-.143l-.133.099-51.345 38.281c-9.808 7.225-23.611.254-23.615-11.868v-856.074c.002-12.199 9.735-22.122 21.86-22.431l.579-.008ZM896.405-60.686h856.065c12.39 0 22.43 10.045 22.44 22.438v341.475c-.01 12.392-10.05 22.437-22.44 22.438h-209.82c-244.15-.001-473.91-115.382-619.746-311.116v-.143l-.098-.133-38.283-51.345h.001c-7.224-9.809-.244-23.614 11.881-23.614Z" />
					</g>
					<defs>
						<clipPath id="reveal-clip"><path fill="#fff" d="M0 0h2001v1039H0z" /></clipPath>
					</defs>
				</svg>
			</div>

			<!-- Div de luz -->
			<div id="glow"></div>

			<!-- Conteúdo -->
			<div class="hero-content">
				<h1>Título da Hero</h1>
				<p>Subtítulo ou descrição aqui</p>
			</div>
		</section>

		<!-- Cursor -->
		<div id="cursor"></div>

		<script>
			const glow = document.getElementById("glow");
			const cursorDot = document.getElementById("cursor");
			const starReveal = document.getElementById("star-reveal");
			const hero = document.querySelector(".hero");

			function move(x, y) {
				glow.style.left = x + "px";
				glow.style.top = y + "px";

				// A mask usa coordenadas relativas ao elemento — converte para relativo à hero
				const rect = hero.getBoundingClientRect();
				const rx = x - rect.left;
				const ry = y - rect.top;

				starReveal.style.setProperty("--mx", rx + "px");
				starReveal.style.setProperty("--my", ry + "px");

				cursorDot.style.left = x + "px";
				cursorDot.style.top = y + "px";
			}

			window.addEventListener("mousemove", (e) => move(e.clientX, e.clientY));

			window.addEventListener(
				"touchmove",
				(e) => {
					e.preventDefault();
					move(e.touches[0].clientX, e.touches[0].clientY);
				},
				{ passive: false },
			);
		</script>
	</body>
</html>
